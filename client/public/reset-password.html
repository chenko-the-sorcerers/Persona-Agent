<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Arutala Persona Agent</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/styles.css" />

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(15,23,42,.18);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .auth-body { padding: 28px 28px 32px; }

    .auth-logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .auth-logo-icon { font-size: 40px; display: block; margin-bottom: 6px; }
    .auth-logo h2 {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin: 0;
    }
    .auth-logo p {
      font-size: 12px;
      color: var(--muted);
      margin: 4px 0 0;
    }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 2px solid var(--border);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      transition: all .2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(8,145,178,.12);
    }

    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .toggle-password:hover {
      opacity: 1;
    }

    .auth-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark, #0e7490));
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(8,145,178,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .auth-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(8,145,178,.4);
    }
    .auth-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .auth-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-error.show { display: block; }

    .auth-success {
      background: #d1fae5;
      color: #065f46;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-success.show { display: block; }

    .auth-footer-link {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
    }
    .auth-footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .password-strength {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width .3s, background .3s;
    }
    .strength-weak { width: 33%; background: #ef4444; }
    .strength-medium { width: 66%; background: #f59e0b; }
    .strength-strong { width: 100%; background: #10b981; }
  </style>
</head>
<body>

<div class="blob-field">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<!-- Nav -->
<nav>
  <div class="inner">
    <a href="index.html" class="logo" style="text-decoration:none;">
      <span style="font-weight:800;color:var(--primary);">Arutala</span>
      <span class="brand">Persona Agent</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation">
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
    </button>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Personas</a>
      <a href="chatbot.html" class="nav-link">Try Chat</a>
      <a href="src/pages/login.html" class="nav-link">Login</a>
      <a href="src/pages/about.html" class="nav-link">About</a>
    </div>
  </div>
</nav>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-body">
      <div class="auth-logo">
        <span class="auth-logo-icon">🔑</span>
        <h2>Reset Password</h2>
        <p>Buat password baru untuk akun Anda</p>
      </div>

      <div class="auth-error" id="reset-error"></div>
      <div class="auth-success" id="reset-success"></div>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="new-password">Password Baru</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" placeholder="Minimal 6 karakter" required autocomplete="new-password" />
            <button type="button" class="toggle-password" onclick="togglePassword('new-password', this)">👁️</button>
          </div>
          <div class="password-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span id="strength-text"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Konfirmasi Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" placeholder="Ulangi password baru" required autocomplete="new-password" />
            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)">👁️</button>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="reset-btn">
          Reset Password
        </button>
      </form>

      <div class="auth-footer-link">
        Kembali ke <a href="src/pages/login.html">Login</a>
      </div>
    </div>
  </div>
</main>

<script src="src/js/config.js"></script>
<script>
  // Mobile nav toggle
  (function() {
    const nav = document.querySelector('nav');
    if (!nav) return;
    const toggle = nav.querySelector('.nav-toggle');
    const links = nav.querySelector('.nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', () => {
      nav.classList.toggle('nav-open');
    });
    links.addEventListener('click', (e) => {
      if (e.target.closest('.nav-link')) {
        nav.classList.remove('nav-open');
      }
    });
  })();

  // Toggle password visibility
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁️';
    }
  }

  // Password strength indicator
  document.getElementById('new-password').addEventListener('input', function(e) {
    const password = e.target.value;
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    
    if (password.length === 0) {
      fill.className = 'strength-fill';
      text.textContent = '';
      return;
    }
    
    let strength = 0;
    if (password.length >= 6) strength++;
    if (password.length >= 10) strength++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
    if (/\d/.test(password)) strength++;
    if (/[^a-zA-Z0-9]/.test(password)) strength++;
    
    if (strength <= 2) {
      fill.className = 'strength-fill strength-weak';
      text.textContent = 'Lemah';
    } else if (strength <= 3) {
      fill.className = 'strength-fill strength-medium';
      text.textContent = 'Sedang';
    } else {
      fill.className = 'strength-fill strength-strong';
      text.textContent = 'Kuat';
    }
  });

  function showError(msg) {
    const el = document.getElementById('reset-error');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('reset-success').classList.remove('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  function showSuccess(msg) {
    const el = document.getElementById('reset-success');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('reset-error').classList.remove('show');
  }

  async function handleReset(e) {
    e.preventDefault();
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (!token) {
      showError('Token reset tidak valid. Silakan request ulang reset password.');
      return;
    }
    
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-btn');

    if (newPassword.length < 6) {
      showError('Password minimal 6 karakter!');
      return;
    }

    if (newPassword !== confirmPassword) {
      showError('Password tidak cocok!');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      const res = await fetch(`${API_URL}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });

      const data = await res.json();

      if (data.success) {
        showSuccess(data.message || 'Password berhasil direset! Silakan login.');
        document.getElementById('reset-form').reset();
        
        // Redirect ke login setelah 2 detik
        setTimeout(() => {
          window.location.href = 'src/pages/login.html';
        }, 2000);
      } else {
        showError(data.message || 'Terjadi kesalahan. Silakan coba lagi.');
      }
    } catch (err) {
      console.error('Reset password error:', err);
      showError('Tidak dapat terhubung ke server. Silakan coba lagi.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }
</script>

</body>
</html>
