<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lupa Password — Arutala Persona Agent</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/styles.css" />

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(15,23,42,.18);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .auth-body { padding: 28px 28px 32px; }

    .auth-logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .auth-logo-icon { font-size: 40px; display: block; margin-bottom: 6px; }
    .auth-logo h2 {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin: 0;
    }
    .auth-logo p {
      font-size: 12px;
      color: var(--muted);
      margin: 4px 0 0;
    }

    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 2px solid var(--border);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      transition: all .2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(8,145,178,.12);
    }

    .auth-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark, #0e7490));
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(8,145,178,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .auth-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(8,145,178,.4);
    }
    .auth-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .auth-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-error.show { display: block; }

    .auth-success {
      background: #d1fae5;
      color: #065f46;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .auth-success.show { display: block; }

    .auth-footer-link {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
    }
    .auth-footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="blob-field">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
</div>

<!-- Nav -->
<nav>
  <div class="inner">
    <a href="index.html" class="logo" style="text-decoration:none;">
      <span style="font-weight:800;color:var(--primary);">Arutala</span>
      <span class="brand">Persona Agent</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation">
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
      <span class="nav-toggle-line"></span>
    </button>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Personas</a>
      <a href="chatbot.html" class="nav-link">Try Chat</a>
      <a href="src/pages/login.html" class="nav-link">Login</a>
      <a href="src/pages/about.html" class="nav-link">About</a>
    </div>
  </div>
</nav>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-body">
      <div class="auth-logo">
        <span class="auth-logo-icon">🔐</span>
        <h2>Lupa Password?</h2>
        <p>Masukkan email untuk reset password</p>
      </div>

      <div class="auth-error" id="forgot-error"></div>
      <div class="auth-success" id="forgot-success"></div>

      <form id="forgot-form" onsubmit="handleForgot(event)">
        <div class="form-group">
          <label for="forgot-email">Email</label>
          <input type="email" id="forgot-email" placeholder="kamu@email.com" required autocomplete="email" />
        </div>

        <button type="submit" class="auth-btn" id="forgot-btn">
          Kirim Link Reset
        </button>
      </form>

      <div class="auth-footer-link">
        Sudah ingat password? <a href="src/pages/login.html">Masuk sekarang</a>
      </div>
    </div>
  </div>
</main>

<script src="src/js/config.js"></script>
<script>
  // Mobile nav toggle
  (function() {
    const nav = document.querySelector('nav');
    if (!nav) return;
    const toggle = nav.querySelector('.nav-toggle');
    const links = nav.querySelector('.nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', () => {
      nav.classList.toggle('nav-open');
    });
    links.addEventListener('click', (e) => {
      if (e.target.closest('.nav-link')) {
        nav.classList.remove('nav-open');
      }
    });
  })();

  function showError(msg) {
    const el = document.getElementById('forgot-error');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('forgot-success').classList.remove('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  function showSuccess(msg) {
    const el = document.getElementById('forgot-success');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('forgot-error').classList.remove('show');
  }

  async function handleForgot(e) {
    e.preventDefault();
    
    const email = document.getElementById('forgot-email').value.trim();
    const btn = document.getElementById('forgot-btn');

    if (!email) {
      showError('Email wajib diisi!');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Mengirim...';

    try {
      const res = await fetch(`${API_URL}/api/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      if (data.success) {
        showSuccess(data.message || 'Link reset password telah dikirim ke email Anda.');
        document.getElementById('forgot-form').reset();
        
        // DEV ONLY: Log token untuk testing
        if (data.devToken) {
          console.log('🔑 Dev Reset Token:', data.devToken);
          console.log('🔗 Reset Link:', `${window.location.origin}/reset-password.html?token=${data.devToken}`);
        }
      } else {
        showError(data.message || 'Terjadi kesalahan. Silakan coba lagi.');
      }
    } catch (err) {
      console.error('Forgot password error:', err);
      showError('Tidak dapat terhubung ke server. Silakan coba lagi.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Kirim Link Reset';
    }
  }
</script>

</body>
</html>
